name: format

# Verifies every file in the repo is Prettier-formatted. Prettier's version
# is pinned in the root package.json — bumps come through Dependabot.
# Run locally with `npm run format` to fix, or `npm run format:check` to preview.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: format-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci
        run: npm ci

      - name: prettier --check
        run: npm run format:check
