name: typecheck

# Public-cookbook rot signal: a green badge proves every recipe still
# type-checks against its pinned @simular-ai/simulang-js version. Catches
# the version-drift class of bugs (renamed/removed APIs) without needing
# the GUI / API keys / Mac App Store apps that recipes depend on at runtime.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Auto-discover recipes so adding a new folder doesn't require touching CI.
  # A recipe is any top-level folder that has both package.json and tsconfig.json.
  discover:
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.list.outputs.recipes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: list
        run: |
          recipes=$(for d in */; do
            d="${d%/}"
            if [ -f "$d/package.json" ] && [ -f "$d/tsconfig.json" ]; then
              echo "$d"
            fi
          done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "recipes=$recipes" >> "$GITHUB_OUTPUT"
          echo "Discovered recipes: $recipes"

  typecheck:
    needs: discover
    name: ${{ matrix.recipe }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.discover.outputs.recipes) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: ${{ matrix.recipe }}/package-lock.json

      - name: npm ci
        working-directory: ${{ matrix.recipe }}
        run: npm ci

      - name: tsc --noEmit
        working-directory: ${{ matrix.recipe }}
        run: npx tsc --noEmit
