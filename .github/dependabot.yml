version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'

  # Root package.json holds repo-wide dev tooling only
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
